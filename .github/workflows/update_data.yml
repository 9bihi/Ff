name: Update FPL Data

on:
  schedule:
    - cron: '0 2 * * *'   # every day at 02:00 UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug — verify imports and secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Installed packages ==="
          pip list | grep -E "psycopg2|sqlalchemy|pandas|requests|beautifulsoup4|lxml"
          echo "=== Test imports ==="
          python -c "
          import sys, os
          sys.path.insert(0, os.getcwd())
          print('psycopg2:', end=' '); import psycopg2; print('OK')
          print('sqlalchemy:', end=' '); import sqlalchemy; print('OK')
          print('pandas:', end=' '); import pandas; print('OK')
          print('bs4:', end=' '); import bs4; print('OK')
          print('requests:', end=' '); import requests; print('OK')
          print('src.ingestion.runner:', end=' ')
          from src.ingestion.runner import main; print('OK')
          "
          echo "=== DATABASE_URL set? ==="
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL is empty!"
            exit 1
          else
            echo "YES (length=${#DATABASE_URL})"
          fi

      - name: Run ingestion script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python run_ingestion.py